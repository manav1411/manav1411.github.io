<!DOCTYPE html>
<html>
<script>	
	Object.defineProperty(navigator, 'userAgent', {
    get: function () { return 'Mozilla/5.0 (Windows; U; Windows NT 6.1; en-US) AppleWebKit/534.11 (KHTML, like Gecko) Chrome/9.0.570.1 Safari/534.11'; }
});
	  async function get() {
    let url = "https://api.allorigins.win/get?url="+"https://instagram.com/instagram/?__a=1"
    let obj = await (await fetch(url)).json();
    
    //console.log(obj);
    return obj;
}
var tags;
(async () => {
  tags = await get()
  //console.log(tags)
  document.getElementById("tags").innerHTML = JSON.stringify(tags);
})()
</script>	
	<div id="tags"></div>
</html>
