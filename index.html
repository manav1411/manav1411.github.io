<!DOCTYPE html>
<html>
<script>	
Object.defineProperty(navigator, 'userAgent', {
    get: function () { return 'Mozilla/5.0 (Windows NT 6.2; WOW64; 
    rv:28.0) Gecko/20100101 Firefox/28.0)'; }
});
	
	  async function get() {
    let url = "https://api.allorigins.win/get?url="+"https://instagram.com/instagram/?__a=1"
    let obj = await (await fetch(url)).json();
    
    //console.log(obj);
    return obj;
}
var tags;
(async () => {
  tags = await get()
  //console.log(tags)
  document.getElementById("tags").innerHTML = JSON.stringify(tags);
})()
</script>	
	<div id="tags"></div>
</html>
