<script>	
	  async function get() {
    let url = "https://api.allorigins.win/get?url="+"https://www.instagram.com/instagram/?__a=1"
    let obj = await (await fetch(url)).json();
    
    //console.log(obj);
    return obj;
}
var tags;
(async () => {
  tags = await get()
  //console.log(tags)
  document.getElementById("tags").innerHTML = JSON.stringify(tags);
})()
</script>
